<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Offline | CryptoVision AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-dark-950: #020617;
      --color-dark-900: #0f172a;
      --color-dark-800: #1e293b;
      --indigo-500: #6366f1;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-dark-950);
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Grid background effect */
    .terminal-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(to right, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
      pointer-events: none;
    }

    .glass-panel {
      position: relative;
      z-index: 2;
      background: rgba(15, 23, 42, 0.65);
      border: 1px response rgba(255, 255, 255, 0.05);
      border-color: rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px 32px;
      max-w: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.05);
    }

    .icon-container {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: var(--indigo-500);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn-premium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--indigo-500), #4f46e5);
      color: #ffffff;
      border: none;
      font-size: 12.5px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .btn-premium:hover {
      transform: translateY(-1.5px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
      opacity: 0.95;
    }

    .btn-premium:active {
      transform: translateY(0);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: #f43f5e;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #f43f5e;
    }
  </style>
</head>
<body>
  <div class="terminal-grid"></div>
  <div class="glass-panel">
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>Terminal Offline</span>
    </div>
    <div class="icon-container">
      <!-- Wifi Off SVG Vector -->
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
        <path d="M12 18.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"></path>
        <path d="M8.58 8.58A15 15 0 0 1 12 8a15.89 15.89 0 0 1 9.3 3"></path>
        <path d="M1.07 8.07A15.93 15.93 0 0 1 4.7 6.3"></path>
        <path d="M22.93 3.07a16.12 16.12 0 0 1-5.18 1.9"></path>
        <path d="M6.07 3.07a16.07 16.07 0 0 1 5.93-1.07"></path>
      </svg>
    </div>
    <h1>Connection Lost</h1>
    <p>We are unable to bridge to the cryptocurrency index nodes. Please check your network cables or click refresh to re-establish connection.</p>
    <button class="btn-premium" onclick="window.location.reload()">
      Reconnect Terminal
    </button>
  </div>
</body>
</html>
