<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- SEO Best Practices -->
    <title>CryptoVision AI - Advanced Fintech Co-Pilot & Terminal</title>
    <meta name="description" content="Experience premium real-time cryptocurrency portfolio analytics, interactive charts, and AI-driven investment co-pilot insights." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-dark-950 text-slate-100 font-sans antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalhost = Boolean(
            window.location.hostname === 'localhost' ||
            window.location.hostname === '[::1]' ||
            window.location.hostname.match(/^127(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$/)
          );

          if (isLocalhost) {
            // Unregister service workers
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              for (let registration of registrations) {
                registration.unregister();
                console.log('[PWA] Service Worker unregistered in development mode:', registration);
              }
            });
            // Clear caches
            if (window.caches) {
              caches.keys().then((keys) => {
                keys.forEach((key) => {
                  caches.delete(key);
                  console.log('[PWA] Cache cleared in development mode:', key);
                });
              });
            }
          } else {
            navigator.serviceWorker.register('/sw.js')
              .then((reg) => console.log('[PWA] Service Worker registered:', reg.scope))
              .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
          }
        });
      }
    </script>
  </body>
</html>
